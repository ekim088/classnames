name: Release

on:
  push:
    branches:
      - main

# only one release run at a time
concurrency: ${{ github.workflow }}-${{ github.ref }}

permissions:
  contents: read

jobs:
  release-please:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      issues: write
      pull-requests: write

    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}

    steps:
      - uses: googleapis/release-please-action@45996ed1f6d02564a971a2fa1b5860e934307cf7 # v5.0.0
        id: release
        with:
          # use a PAT (not the default GITHUB_TOKEN) so the release PR triggers
          # standard CI workflow (PRs opened by GITHUB_TOKEN cannot). Falls back
          # to GITHUB_TOKEN when the secret is absent (releases still work, but
          # the PR won't run CI).
          token: ${{ secrets.RELEASE_PLEASE_PAT || github.token }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  # build and publish to npm when a release was just tagged
  publish:
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write # for npm OIDC trusted publishing + provenance

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
          registry-url: https://registry.npmjs.org

      # corepack is no longer bundled with Node.js 25+
      - run: npm install -g corepack && corepack enable
      - run: yarn install --immutable
      - run: yarn build

      # pack with yarn so the prepack/postpack (pinst) hooks resolve under PnP,
      # then publish with npm for OIDC trusted publishing
      - run: yarn pack --out package.tgz
      - name: Publish to npm
        run: |
          npm install -g npm@latest
          npm publish package.tgz --provenance --access public
