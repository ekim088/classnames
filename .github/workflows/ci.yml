name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x, 26.x]

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node-version }}
      # corepack is no longer bundled with Node.js 25+
      - run: npm install -g corepack && corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn lint
      - run: yarn test:coverage

  # validate the package can be consumed via both ESM and CommonJS, including
  # the subpath exports
  package:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Use Node.js 24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 24.x
      - run: npm install -g corepack && corepack enable
      - run: yarn install --immutable
      - run: yarn build
      - run: yarn pack --out package.tgz
      - name: Validate import methods
        run: |
          mkdir "$RUNNER_TEMP/consumer" && cd "$RUNNER_TEMP/consumer"
          npm init -y > /dev/null
          npm install "$GITHUB_WORKSPACE/package.tgz"
          for sub in '' '/dedupe' '/cached'; do
              node -e "if (typeof require('@ekim088/classnames$sub').default !== 'function') throw new Error('CJS import failed: $sub');"
              node --input-type=module -e "import d from '@ekim088/classnames$sub'; if (typeof d !== 'function') throw new Error('ESM import failed: $sub');"
          done
